<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page Feedback</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md text-center">
        <h1 class="text-3xl font-bold mb-4">🚀 Landing Page Feedback</h1>
        <p class="text-gray-700 mb-6">Get expert, actionable feedback on your landing page to boost conversions.</p>
        <p class="text-2xl font-semibold mb-4">Only $9.99</p>
        <form action="YOUR_STRIPE_CHECKOUT_LINK_HERE" method="POST">
            <div class="mb-4 text-left">
                <label for="landingPageUrl" class="block text-gray-700 text-sm font-bold mb-2">Your Landing Page URL:</label>
                <input type="url" id="landingPageUrl" name="landingPageUrl" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" placeholder="https://yourproduct.com" required>
            </div>
            <div class="mb-6 text-left">
                <label for="questions" class="block text-gray-700 text-sm font-bold mb-2">Any specific questions? (optional)</label>
                <textarea id="questions" name="questions" rows="3" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" placeholder="e.g., Is my CTA clear enough?"></textarea>
            </div>
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline w-full">
                Get Feedback Now!
            </button>
        </form>
        <p class="text-gray-500 text-xs mt-4">Delivered as a concise PDF within 48 hours.</p>
    </div>
</body>
</html>
