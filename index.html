<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex LP Feedback</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://js.stripe.com/v3/"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h1 class="text-3xl font-bold text-center mb-6">Apex LP Feedback</h1>
        <p class="text-center text-gray-600 mb-6">Get instant AI feedback for your landing page.</p>
        <form id="feedbackForm" class="space-y-4">
            <div>
                <label for="urlInput" class="block text-sm font-medium text-gray-700">Landing Page URL</label>
                <input type="url" id="urlInput" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2" placeholder="https://yourlandingpage.com" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded-md hover:bg-blue-700">Get Feedback ($9.99)</button>
        </form>
        <div id="feedbackResults" class="mt-6 bg-gray-50 p-4 rounded-md hidden">
            <h2 class="text-xl font-semibold mb-2">Feedback:</h2>
            <div id="resultsContent" class="text-gray-800"></div>
        </div>
        <p class="text-center text-gray-500 text-sm mt-6">By using this service, you agree to our <a href="/terms" class="text-blue-500 hover:underline">Terms</a> and <a href="/privacy" class="text-blue-500 hover:underline">Privacy Policy</a>.</p>
    </div>
    <script>
        const stripe = Stripe('YOUR_STRIPE_PUBLIC_KEY'); // Replace with your actual public key
        const form = document.getElementById('feedbackForm');
        const urlInput = document.getElementById('urlInput');
        const feedbackResults = document.getElementById('feedbackResults');
        const resultsContent = document.getElementById('resultsContent');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            alert('Payment simulation: In a real app, Stripe Checkout would open here.');
            // Simulate feedback for demo purposes
            feedbackResults.classList.remove('hidden');
            resultsContent.innerHTML = '<p>Clarity: &quot;Headline could be more direct.&quot;</p><p>CTA: &quot;Make button text action-oriented.&quot;</p><p>Mobile: &quot;Check image scaling on smaller screens.&quot;</p>';
        });
    </script>
</body>
</html>
