<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>APEX Landing Page Feedback</title><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-gray-100 flex items-center justify-center min-h-screen"><div class="bg-white p-8 rounded-lg shadow-md max-w-md w-full text-center"><h1 class="text-3xl font-bold mb-4 text-gray-800">APEX Landing Page Feedback</h1><p class="mb-6 text-gray-600">Get concise, actionable feedback on your landing page within 24 hours.</p><form action="/submit" method="POST" enctype="multipart/form-data" class="space-y-4"><input type="url" name="page_url" placeholder="Landing Page URL (e.g. https://yoursite.com)" class="w-full p-3 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500"><p class="text-sm text-gray-500">-OR-</p><label for="screenshot" class="block text-left text-gray-700">Upload Screenshot:</label><input type="file" name="screenshot" id="screenshot" accept="image/*" class="w-full p-3 border border-gray-300 rounded-md"><textarea name="goals" placeholder="What are your main goals for this page?" rows="3" class="w-full p-3 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500"></textarea><input type="email" name="email" placeholder="Your Email for Feedback" required class="w-full p-3 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500"><button type="submit" class="w-full bg-blue-600 text-white p-3 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50">Get Feedback for $9.99</button></form><p class="mt-4 text-sm text-gray-500">Powered by APEX</p></div></body></html>
